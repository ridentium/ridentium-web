<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#1a1814" />
  <title>RIDENTIUM — Offline</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1814;
      color: #c8c4bb;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .card {
      background: #221f1b;
      border: 1px solid #2e2b26;
      border-radius: 12px;
      padding: 2.5rem 2rem;
      max-width: 380px;
      width: 100%;
      text-align: center;
    }

    .icon {
      width: 52px;
      height: 52px;
      margin: 0 auto 1.5rem;
      background: rgba(200, 180, 140, 0.08);
      border: 1px solid rgba(200, 180, 140, 0.15);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .icon svg { opacity: 0.6; }

    .logo {
      font-size: 0.65rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #c8b48c;
      opacity: 0.7;
      margin-bottom: 1.25rem;
    }

    h1 {
      font-size: 1.125rem;
      font-weight: 500;
      color: #ede8e0;
      margin-bottom: 0.5rem;
    }

    p {
      font-size: 0.8125rem;
      color: #8a8680;
      line-height: 1.6;
      margin-bottom: 1.75rem;
    }

    button {
      background: rgba(200, 180, 140, 0.1);
      border: 1px solid rgba(200, 180, 140, 0.2);
      color: #c8b48c;
      font-size: 0.8125rem;
      font-weight: 500;
      padding: 0.625rem 1.5rem;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s;
      letter-spacing: 0.02em;
    }

    button:hover { background: rgba(200, 180, 140, 0.16); }
    button:active { background: rgba(200, 180, 140, 0.22); }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none"
           stroke="#c8b48c" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="1" y1="1" x2="23" y2="23"/>
        <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/>
        <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/>
        <path d="M10.71 5.05A16 16 0 0 1 22.56 9"/>
        <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/>
        <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
        <circle cx="12" cy="20" r="1" fill="#c8b48c" stroke="none"/>
      </svg>
    </div>
    <p class="logo">RIDENTIUM</p>
    <h1>Connessione assente</h1>
    <p>Il dispositivo non è connesso a Internet.<br>Controlla la connessione e riprova.</p>
    <button onclick="window.location.reload()">Riprova</button>
  </div>
</body>
</html>
